ktor {
    deployment {
        # HTTP port. Overridable via the PORT env var; defaults to 8080.
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.monteapp.ApplicationKt.module ]
    }
}

# Postgres / persistence configuration.
#
# Persistence is OFF by default so the server boots without a database during
# early development. Flip DB_ENABLED=true (and run Postgres) to turn it on.
postgres {
    enabled = false
    enabled = ${?DB_ENABLED}

    jdbcUrl = "jdbc:postgresql://localhost:5432/monte"
    jdbcUrl = ${?DB_JDBC_URL}

    user = "monte"
    user = ${?DB_USER}

    password = "monte"
    password = ${?DB_PASSWORD}

    driver = "org.postgresql.Driver"
    maxPoolSize = 10
    maxPoolSize = ${?DB_MAX_POOL_SIZE}
}
